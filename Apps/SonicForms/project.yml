name: SonicForms
options:
  bundleIdPrefix: com.zevgt
  deploymentTarget:
    watchOS: "10.0"
packages:
  HeroKit:
    path: ../../HeroKit
targets:
  SonicForms:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Sources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.zevgt.sonicforms
      DEVELOPMENT_TEAM: DU52C58N97
      CODE_SIGN_STYLE: Automatic
      INFOPLIST_FILE: Sources/Info.plist
      SWIFT_VERSION: "5.0"
      TARGETED_DEVICE_FAMILY: "4"
      SWIFT_EMIT_LOC_STRINGS: YES
      CURRENT_PROJECT_VERSION: "1"
      MARKETING_VERSION: "1.0"
    dependencies:
      - package: HeroKit
    scheme:
      testTargets:
        - SonicFormsTests
  SonicFormsTests:
    type: bundle.unit-test
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Tests
    settings:
      SWIFT_VERSION: "5.0"
    dependencies:
      - target: SonicForms
