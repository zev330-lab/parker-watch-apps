name: ParkersHeart
options:
  bundleIdPrefix: com.zevgt
  deploymentTarget:
    watchOS: "10.0"
    iOS: "16.0"
packages:
  HeroKit:
    path: ../../HeroKit

targets:

  # ── watchOS app ──────────────────────────────────────────────────────────
  ParkersHeart:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Sources
    entitlements:
      path: Sources/ParkersHeart.entitlements
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.zevgt.parkersheart
      DEVELOPMENT_TEAM: DU52C58N97
      CODE_SIGN_STYLE: Automatic
      INFOPLIST_FILE: Sources/Info.plist
      SWIFT_VERSION: "5.0"
      TARGETED_DEVICE_FAMILY: "4"
      SWIFT_EMIT_LOC_STRINGS: YES
      CURRENT_PROJECT_VERSION: "1"
      MARKETING_VERSION: "1.0"
    dependencies:
      - package: HeroKit
    scheme:
      testTargets:
        - ParkersHeartTests

  ParkersHeartTests:
    type: bundle.unit-test
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Tests
    settings:
      SWIFT_VERSION: "5.0"
    dependencies:
      - target: ParkersHeart

  # ── iOS companion app (Dad's message editor) ─────────────────────────────
  DadMessages:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: DadSources
    entitlements:
      path: DadSources/DadMessages.entitlements
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.zevgt.dadmessages
      DEVELOPMENT_TEAM: DU52C58N97
      CODE_SIGN_STYLE: Automatic
      INFOPLIST_FILE: DadSources/Info.plist
      SWIFT_VERSION: "5.0"
      TARGETED_DEVICE_FAMILY: "1,2"
      CURRENT_PROJECT_VERSION: "1"
      MARKETING_VERSION: "1.0"
